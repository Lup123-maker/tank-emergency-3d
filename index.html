<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>罐区应急处置3D培训</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
            background: #1a1a2e;
        }
        #canvas-container { width: 100vw; height: 100vh; }
        canvas { display: block; }
        
        /* 顶部标题 */
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 12px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            color: #fff;
            z-index: 100;
            pointer-events: none;
        }
        #header h1 {
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        #header p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 2px;
        }

        /* 步骤面板 */
        #step-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(0deg, rgba(10,10,30,0.95) 0%, rgba(10,10,30,0.85) 70%, transparent 100%);
            padding: 20px 20px 30px;
            z-index: 100;
            color: #fff;
        }
        #step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .step-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
            cursor: pointer;
        }
        .step-dot.active {
            background: #ff6b35;
            box-shadow: 0 0 8px #ff6b35;
            transform: scale(1.3);
        }
        .step-dot.completed {
            background: #4ecdc4;
        }
        #step-title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #ff6b35;
        }
        #step-desc {
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
            opacity: 0.9;
            max-width: 500px;
            margin: 0 auto 16px;
        }
        #step-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); }
        .btn-prev {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-next {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255,107,53,0.4);
        }
        .btn-auto {
            background: rgba(78,205,196,0.2);
            color: #4ecdc4;
            border: 1px solid #4ecdc4;
        }
        .btn-auto.playing {
            background: #4ecdc4;
            color: #1a1a2e;
        }

        /* 加载画面 */
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            color: #fff;
            transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { margin-top: 16px; font-size: 14px; opacity: 0.7; }

        /* 提示 */
        #hint {
            position: fixed;
            top: 70px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 12px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        #hint.show { opacity: 1; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <p>正在加载3D场景...</p>
    </div>

    <div id="header">
        <h1>罐区火灾应急处置流程</h1>
        <p>中石油燃料油（温州）分公司 · 安全培训</p>
    </div>

    <div id="hint">拖动旋转 · 双指缩放</div>

    <div id="canvas-container"></div>

    <div id="step-panel">
        <div id="step-indicator"></div>
        <div id="step-title"></div>
        <div id="step-desc"></div>
        <div id="step-controls">
            <button class="btn btn-prev" onclick="prevStep()">上一步</button>
            <button class="btn btn-auto" id="btn-auto" onclick="toggleAuto()">自动播放</button>
            <button class="btn btn-next" onclick="nextStep()">下一步</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
    // ============ 场景配置 ============
    const STEPS = [
        {
            title: "发现险情",
            desc: "巡检人员发现T301-3外浮顶罐浮盘密封圈处起火，立即按下手动报警按钮，向中控室报告火情。",
            camera: { x: 25, y: 18, z: 25, tx: 0, ty: 8, tz: 0 }
        },
        {
            title: "启动应急预案",
            desc: "中控室确认火情后，立即启动罐区火灾应急预案，通知应急指挥部，拨打119报警，同时广播疏散警报。",
            camera: { x: 0, y: 30, z: 35, tx: 0, ty: 5, tz: 0 }
        },
        {
            title: "关闭紧急切断阀",
            desc: "操作人员远程关闭T301-3罐进出口紧急切断阀，切断油品来源，防止火势蔓延扩大。",
            camera: { x: -15, y: 8, z: 15, tx: -8, ty: 3, tz: 0 }
        },
        {
            title: "启动泡沫灭火系统",
            desc: "启动固定式泡沫灭火系统，向T301-3罐内喷射泡沫覆盖液面，隔绝空气抑制燃烧。",
            camera: { x: 12, y: 15, z: 12, tx: 0, ty: 10, tz: 0 }
        },
        {
            title: "冷却相邻储罐",
            desc: "开启相邻T301-2、T301-4罐的喷淋冷却水系统，防止热辐射引燃邻近储罐，避免连锁事故。",
            camera: { x: -20, y: 20, z: 20, tx: 0, ty: 8, tz: 0 }
        },
        {
            title: "人员疏散警戒",
            desc: "无关人员沿上风方向紧急疏散至集合点，警戒组在罐区周围设置警戒线，禁止无关人员进入。",
            camera: { x: 30, y: 12, z: -10, tx: 0, ty: 5, tz: 0 }
        },
        {
            title: "消防协同处置",
            desc: "消防队到场后，配合开展灭火作战，利用消防车移动炮和固定泡沫系统联合进攻，直至火灾扑灭。",
            camera: { x: 0, y: 25, z: -30, tx: 0, ty: 8, tz: 0 }
        }
    ];

    let scene, camera, renderer, controls;
    let currentStep = 0;
    let autoPlay = false;
    let autoTimer = null;
    let fireParticles = [], smokeParticles = [], foamParticles = [], waterParticles = [];
    let tanks = [], valves = [], fireTruck;
    let animationMixers = [];
    let clock = new THREE.Clock();

    // ============ 初始化 ============
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 80, 150);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(25, 18, 25);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.1;
        controls.minDistance = 10;
        controls.maxDistance = 80;
        controls.target.set(0, 8, 0);

        setupLights();
        createGround();
        createTanks();
        createPipes();
        createFireEquipment();
        createFireTruck();
        createEnvironment();

        // 初始隐藏火灾效果
        setFireVisible(false);

        // UI
        buildStepIndicator();
        showStep(0);

        // 事件
        window.addEventListener('resize', onResize);

        // 隐藏加载
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
            showHint();
        }, 800);

        animate();
    }

    // ============ 灯光 ============
    function setupLights() {
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(30, 40, 20);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        sun.shadow.camera.left = -50;
        sun.shadow.camera.right = 50;
        sun.shadow.camera.top = 50;
        sun.shadow.camera.bottom = -50;
        scene.add(sun);

        const hemi = new THREE.HemisphereLight(0x87CEEB, 0x556633, 0.3);
        scene.add(hemi);
    }

    // ============ 地面 ============
    function createGround() {
        // 主地面
        const groundGeo = new THREE.PlaneGeometry(120, 120);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x8B9467 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 罐区防火堤
        const wallMat = new THREE.MeshLambertMaterial({ color: 0x999999 });
        const wallH = 2.2, wallT = 0.6;
        const areaW = 50, areaD = 30;
        
        const walls = [
            { w: areaW, d: wallT, x: 0, z: -areaD/2 },
            { w: areaW, d: wallT, x: 0, z: areaD/2 },
            { w: wallT, d: areaD, x: -areaW/2, z: 0 },
            { w: wallT, d: areaD, x: areaW/2, z: 0 }
        ];
        walls.forEach(w => {
            const geo = new THREE.BoxGeometry(w.w, wallH, w.d);
            const mesh = new THREE.Mesh(geo, wallMat);
            mesh.position.set(w.x, wallH/2, w.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
        });

        // 罐区地面（混凝土）
        const concreteGeo = new THREE.PlaneGeometry(areaW, areaD);
        const concreteMat = new THREE.MeshLambertMaterial({ color: 0xBBBBBB });
        const concrete = new THREE.Mesh(concreteGeo, concreteMat);
        concrete.rotation.x = -Math.PI / 2;
        concrete.position.y = 0.02;
        concrete.receiveShadow = true;
        scene.add(concrete);
    }

    // ============ 储罐 ============
    function createTanks() {
        const tankConfigs = [
            { x: -14, z: 0, r: 8, h: 14, name: "T301-2", type: "floating" },
            { x: 0, z: 0, r: 8, h: 14, name: "T301-3", type: "floating", fire: true },
            { x: 14, z: 0, r: 8, h: 14, name: "T301-4", type: "floating" }
        ];

        tankConfigs.forEach(cfg => {
            const group = new THREE.Group();
            group.position.set(cfg.x, 0, cfg.z);

            // 罐体
            const bodyGeo = new THREE.CylinderGeometry(cfg.r, cfg.r, cfg.h, 32);
            const bodyMat = new THREE.MeshPhongMaterial({ 
                color: 0xE8E8E8, 
                specular: 0x333333,
                shininess: 30
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = cfg.h / 2;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            // 罐体条纹
            for (let i = 1; i < 5; i++) {
                const ringGeo = new THREE.TorusGeometry(cfg.r + 0.05, 0.08, 8, 32);
                const ringMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.y = i * (cfg.h / 5);
                ring.rotation.x = Math.PI / 2;
                group.add(ring);
            }

            // 浮顶（外浮顶罐）
            const roofGeo = new THREE.CylinderGeometry(cfg.r - 0.3, cfg.r - 0.3, 0.4, 32);
            const roofMat = new THREE.MeshPhongMaterial({ color: 0xAAAAAA });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = cfg.h - 1;
            roof.castShadow = true;
            group.add(roof);

            // 浮顶上的支柱
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2;
                const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 2, 8);
                const legMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(Math.cos(angle) * 3, cfg.h - 2, Math.sin(angle) * 3);
                group.add(leg);
            }

            // 罐顶栏杆
            const railGeo = new THREE.TorusGeometry(cfg.r, 0.06, 8, 32);
            const railMat = new THREE.MeshLambertMaterial({ color: 0xFFCC00 });
            const rail = new THREE.Mesh(railGeo, railMat);
            rail.position.y = cfg.h + 0.5;
            rail.rotation.x = Math.PI / 2;
            group.add(rail);

            // 梯子
            const ladderGroup = new THREE.Group();
            for (let i = 0; i < 14; i++) {
                const rungGeo = new THREE.BoxGeometry(0.8, 0.06, 0.06);
                const rungMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
                const rung = new THREE.Mesh(rungGeo, rungMat);
                rung.position.y = i + 0.5;
                ladderGroup.add(rung);
            }
            const railL = new THREE.Mesh(new THREE.BoxGeometry(0.06, 14, 0.06), new THREE.MeshLambertMaterial({color: 0x444444}));
            railL.position.set(-0.4, 7, 0);
            ladderGroup.add(railL);
            const railR = railL.clone();
            railR.position.x = 0.4;
            ladderGroup.add(railR);
            ladderGroup.position.set(cfg.r + 0.3, 0, 0);
            group.add(ladderGroup);

            // 编号标牌
            const labelCanvas = document.createElement('canvas');
            labelCanvas.width = 256;
            labelCanvas.height = 64;
            const ctx = labelCanvas.getContext('2d');
            ctx.fillStyle = '#003366';
            ctx.fillRect(0, 0, 256, 64);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 28px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText(cfg.name, 128, 42);
            const labelTex = new THREE.CanvasTexture(labelCanvas);
            const labelGeo = new THREE.PlaneGeometry(4, 1);
            const labelMat = new THREE.MeshBasicMaterial({ map: labelTex });
            const label = new THREE.Mesh(labelGeo, labelMat);
            label.position.set(0, cfg.h * 0.6, cfg.r + 0.1);
            group.add(label);

            // 火灾效果（仅T301-3）
            if (cfg.fire) {
                createFireEffect(group, cfg.r, cfg.h);
                createSmokeEffect(group, cfg.r, cfg.h);
            }

            scene.add(group);
            tanks.push({ group, config: cfg });
        });
    }

    // ============ 火焰粒子 ============
    function createFireEffect(parent, radius, height) {
        const particleCount = 200;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const velocities = [];

        for (let i = 0; i < particleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = Math.random() * (radius - 1);
            positions[i*3] = Math.cos(angle) * r;
            positions[i*3+1] = height - 1 + Math.random() * 3;
            positions[i*3+2] = Math.sin(angle) * r;

            const t = Math.random();
            colors[i*3] = 1.0;
            colors[i*3+1] = 0.3 + t * 0.5;
            colors[i*3+2] = 0.0;

            sizes[i] = 0.5 + Math.random() * 1.5;
            velocities.push({
                x: (Math.random() - 0.5) * 0.02,
                y: 0.05 + Math.random() * 0.1,
                z: (Math.random() - 0.5) * 0.02,
                life: Math.random()
            });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.PointsMaterial({
            size: 1.2,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const points = new THREE.Points(geometry, material);
        points.userData = { velocities, radius, height };
        parent.add(points);
        fireParticles.push(points);
    }

    // ============ 烟雾粒子 ============
    function createSmokeEffect(parent, radius, height) {
        const particleCount = 80;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];

        for (let i = 0; i < particleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = Math.random() * radius * 0.5;
            positions[i*3] = Math.cos(angle) * r;
            positions[i*3+1] = height + 2 + Math.random() * 8;
            positions[i*3+2] = Math.sin(angle) * r;
            velocities.push({
                x: (Math.random() - 0.5) * 0.03 + 0.02,
                y: 0.03 + Math.random() * 0.05,
                z: (Math.random() - 0.5) * 0.03,
                life: Math.random()
            });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const material = new THREE.PointsMaterial({
            size: 3,
            color: 0x333333,
            transparent: true,
            opacity: 0.4,
            depthWrite: false
        });

        const points = new THREE.Points(geometry, material);
        points.userData = { velocities, radius, height };
        parent.add(points);
        smokeParticles.push(points);
    }

    // ============ 管道 ============
    function createPipes() {
        const pipeMat = new THREE.MeshPhongMaterial({ color: 0x4477AA, specular: 0x222222 });
        
        // 主管道
        const mainPipeGeo = new THREE.CylinderGeometry(0.3, 0.3, 40, 12);
        const mainPipe = new THREE.Mesh(mainPipeGeo, pipeMat);
        mainPipe.rotation.z = Math.PI / 2;
        mainPipe.position.set(0, 1.5, 10);
        mainPipe.castShadow = true;
        scene.add(mainPipe);

        // 支管到各罐
        [-14, 0, 14].forEach(x => {
            const branchGeo = new THREE.CylinderGeometry(0.2, 0.2, 10, 12);
            const branch = new THREE.Mesh(branchGeo, pipeMat);
            branch.rotation.x = Math.PI / 2;
            branch.position.set(x, 1.5, 5);
            branch.castShadow = true;
            scene.add(branch);

            // 紧急切断阀
            const valveGroup = new THREE.Group();
            const valveBody = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 12, 12),
                new THREE.MeshPhongMaterial({ color: 0xCC3333 })
            );
            valveGroup.add(valveBody);
            const handle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06, 0.06, 1.2, 8),
                new THREE.MeshLambertMaterial({ color: 0xFFCC00 })
            );
            handle.position.y = 0.6;
            valveGroup.add(handle);
            const wheel = new THREE.Mesh(
                new THREE.TorusGeometry(0.35, 0.05, 8, 16),
                new THREE.MeshLambertMaterial({ color: 0xFFCC00 })
            );
            wheel.position.y = 1.2;
            valveGroup.add(wheel);
            valveGroup.position.set(x, 1.5, 8);
            scene.add(valveGroup);
            valves.push(valveGroup);
        });
    }

    // ============ 消防设施 ============
    function createFireEquipment() {
        // 泡沫管线
        const foamPipeMat = new THREE.MeshPhongMaterial({ color: 0xCC4444 });
        [-14, 0, 14].forEach(x => {
            const pipeGeo = new THREE.CylinderGeometry(0.15, 0.15, 16, 8);
            const pipe = new THREE.Mesh(pipeGeo, foamPipeMat);
            pipe.position.set(x + 3, 8, 3);
            scene.add(pipe);

            // 泡沫喷射口
            const nozzle = new THREE.Mesh(
                new THREE.ConeGeometry(0.3, 0.6, 8),
                new THREE.MeshPhongMaterial({ color: 0xDD5555 })
            );
            nozzle.position.set(x + 3, 16, 3);
            nozzle.rotation.x = Math.PI;
            scene.add(nozzle);
        });

        // 消防栓
        const hydrantMat = new THREE.MeshPhongMaterial({ color: 0xDD2222 });
        [[-20, 12], [20, 12], [-20, -12], [20, -12]].forEach(([x, z]) => {
            const hydrant = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 1.2, 12), hydrantMat);
            body.position.y = 0.6;
            hydrant.add(body);
            const cap = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 8), hydrantMat);
            cap.position.y = 1.3;
            hydrant.add(cap);
            hydrant.position.set(x, 0, z);
            scene.add(hydrant);
        });
    }

    // ============ 消防车 ============
    function createFireTruck() {
        fireTruck = new THREE.Group();
        
        // 车身
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0xCC2222 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(6, 2.5, 2.5), bodyMat);
        body.position.y = 2;
        body.castShadow = true;
        fireTruck.add(body);

        // 驾驶室
        const cab = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2.3), bodyMat);
        cab.position.set(-3, 1.8, 0);
        cab.castShadow = true;
        fireTruck.add(cab);

        // 窗户
        const glassMat = new THREE.MeshPhongMaterial({ color: 0x88CCFF, transparent: true, opacity: 0.6 });
        const windshield = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 1.2), glassMat);
        windshield.position.set(-4.01, 2.2, 0);
        windshield.rotation.y = -Math.PI / 2;
        fireTruck.add(windshield);

        // 轮子
        const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.4, 16);
        const wheelMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        [[-2, -1.3], [-2, 1.3], [1.5, -1.3], [1.5, 1.3]].forEach(([x, z]) => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.x = Math.PI / 2;
            wheel.position.set(x, 0.6, z);
            fireTruck.add(wheel);
        });

        // 水炮
        const cannon = new THREE.Mesh(
            new THREE.CylinderGeometry(0.12, 0.15, 3, 8),
            new THREE.MeshPhongMaterial({ color: 0x888888 })
        );
        cannon.rotation.z = -Math.PI / 4;
        cannon.position.set(1, 4, 0);
        fireTruck.add(cannon);

        // 警灯
        const lightBar = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 0.3, 1),
            new THREE.MeshBasicMaterial({ color: 0xFF0000 })
        );
        lightBar.position.set(-3, 3, 0);
        fireTruck.add(lightBar);

        fireTruck.position.set(0, 0, -22);
        fireTruck.visible = false;
        scene.add(fireTruck);
    }

    // ============ 环境 ============
    function createEnvironment() {
        // 远处建筑
        const buildingMat = new THREE.MeshLambertMaterial({ color: 0x778899 });
        [[-40, -30, 8, 12, 6], [40, -25, 6, 8, 5], [-35, 30, 10, 6, 8]].forEach(([x, z, w, h, d]) => {
            const building = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), buildingMat);
            building.position.set(x, h/2, z);
            building.castShadow = true;
            scene.add(building);
        });

        // 集合点标志
        const poleMat = new THREE.MeshLambertMaterial({ color: 0x339933 });
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 3, 8), poleMat);
        pole.position.set(35, 1.5, 0);
        scene.add(pole);
        
        const signCanvas = document.createElement('canvas');
        signCanvas.width = 128;
        signCanvas.height = 128;
        const sctx = signCanvas.getContext('2d');
        sctx.fillStyle = '#009933';
        sctx.fillRect(0, 0, 128, 128);
        sctx.fillStyle = '#ffffff';
        sctx.font = 'bold 20px sans-serif';
        sctx.textAlign = 'center';
        sctx.fillText('紧急', 64, 50);
        sctx.fillText('集合点', 64, 80);
        const signTex = new THREE.CanvasTexture(signCanvas);
        const sign = new THREE.Mesh(
            new THREE.PlaneGeometry(1.5, 1.5),
            new THREE.MeshBasicMaterial({ map: signTex })
        );
        sign.position.set(35, 3.5, 0);
        scene.add(sign);
    }

    // ============ 火灾可见性 ============
    function setFireVisible(visible) {
        fireParticles.forEach(p => p.visible = visible);
        smokeParticles.forEach(p => p.visible = visible);
    }

    // ============ 泡沫效果 ============
    function createFoamEffect() {
        clearFoam();
        const tank = tanks[1]; // T301-3
        if (!tank) return;
        const particleCount = 100;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];

        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = 3 + (Math.random() - 0.5) * 2;
            positions[i*3+1] = 16;
            positions[i*3+2] = 3 + (Math.random() - 0.5) * 2;
            velocities.push({
                x: (Math.random() - 0.5) * 0.1,
                y: -0.1 - Math.random() * 0.05,
                z: (Math.random() - 0.5) * 0.1,
                life: Math.random()
            });
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({
            size: 0.8,
            color: 0xFFFFEE,
            transparent: true,
            opacity: 0.9,
            depthWrite: false
        });
        const points = new THREE.Points(geometry, material);
        points.userData = { velocities };
        scene.add(points);
        foamParticles.push(points);
    }

    function clearFoam() {
        foamParticles.forEach(p => scene.remove(p));
        foamParticles = [];
    }

    // ============ 冷却水效果 ============
    function createWaterEffect() {
        clearWater();
        [tanks[0], tanks[2]].forEach(tank => {
            if (!tank) return;
            const cx = tank.config.x;
            const particleCount = 60;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = tank.config.r + 0.5;
                positions[i*3] = cx + Math.cos(angle) * r;
                positions[i*3+1] = tank.config.h + 1;
                positions[i*3+2] = Math.sin(angle) * r;
                velocities.push({
                    x: Math.cos(angle) * 0.02,
                    y: -0.08 - Math.random() * 0.04,
                    z: Math.sin(angle) * 0.02,
                    life: Math.random()
                });
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({
                size: 0.5,
                color: 0x4488FF,
                transparent: true,
                opacity: 0.7,
                depthWrite: false
            });
            const points = new THREE.Points(geometry, material);
            points.userData = { velocities, cx, radius: tank.config.r, height: tank.config.h };
            scene.add(points);
            waterParticles.push(points);
        });
    }

    function clearWater() {
        waterParticles.forEach(p => scene.remove(p));
        waterParticles = [];
    }

    // ============ 步骤切换 ============
    function showStep(index) {
        currentStep = index;
        const step = STEPS[index];
        
        document.getElementById('step-title').textContent = `第${index + 1}步：${step.title}`;
        document.getElementById('step-desc').textContent = step.desc;

        // 更新指示器
        document.querySelectorAll('.step-dot').forEach((dot, i) => {
            dot.classList.remove('active', 'completed');
            if (i === index) dot.classList.add('active');
            else if (i < index) dot.classList.add('completed');
        });

        // 相机动画
        animateCamera(step.camera);

        // 场景状态
        updateSceneState(index);
    }

    function updateSceneState(index) {
        // 火灾效果：步骤0-6都显示（灭火过程中逐渐减弱）
        if (index >= 0) {
            setFireVisible(true);
            if (index >= 3) {
                // 泡沫灭火后火焰减弱
                fireParticles.forEach(p => p.material.opacity = Math.max(0.2, 0.8 - (index - 3) * 0.2));
            }
            if (index >= 6) {
                setFireVisible(false);
            }
        }

        // 阀门状态
        valves.forEach((v, i) => {
            if (index >= 2) {
                v.children[2].rotation.y = Math.PI / 2; // 关闭状态
                v.children[0].material.color.setHex(0x339933);
            } else {
                v.children[2].rotation.y = 0;
                v.children[0].material.color.setHex(0xCC3333);
            }
        });

        // 泡沫
        if (index >= 3 && index < 6) {
            createFoamEffect();
        } else {
            clearFoam();
        }

        // 冷却水
        if (index >= 4 && index < 6) {
            createWaterEffect();
        } else {
            clearWater();
        }

        // 消防车
        if (index >= 6) {
            fireTruck.visible = true;
        } else {
            fireTruck.visible = false;
        }
    }

    // ============ 相机动画 ============
    function animateCamera(target) {
        const start = {
            x: camera.position.x, y: camera.position.y, z: camera.position.z,
            tx: controls.target.x, ty: controls.target.y, tz: controls.target.z
        };
        const duration = 1500;
        const startTime = Date.now();

        function update() {
            const elapsed = Date.now() - startTime;
            const t = Math.min(elapsed / duration, 1);
            const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic

            camera.position.set(
                start.x + (target.x - start.x) * ease,
                start.y + (target.y - start.y) * ease,
                start.z + (target.z - start.z) * ease
            );
            controls.target.set(
                start.tx + (target.tx - start.tx) * ease,
                start.ty + (target.ty - start.ty) * ease,
                start.tz + (target.tz - start.tz) * ease
            );

            if (t < 1) requestAnimationFrame(update);
        }
        update();
    }

    // ============ 控制 ============
    function nextStep() {
        if (currentStep < STEPS.length - 1) {
            showStep(currentStep + 1);
        } else {
            showStep(0); // 循环
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            showStep(currentStep - 1);
        }
    }

    function toggleAuto() {
        autoPlay = !autoPlay;
        const btn = document.getElementById('btn-auto');
        if (autoPlay) {
            btn.textContent = '暂停';
            btn.classList.add('playing');
            autoTimer = setInterval(() => {
                if (currentStep < STEPS.length - 1) {
                    nextStep();
                } else {
                    toggleAuto();
                }
            }, 5000);
        } else {
            btn.textContent = '自动播放';
            btn.classList.remove('playing');
            clearInterval(autoTimer);
        }
    }

    function buildStepIndicator() {
        const container = document.getElementById('step-indicator');
        STEPS.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'step-dot';
            dot.onclick = () => showStep(i);
            container.appendChild(dot);
        });
    }

    function showHint() {
        const hint = document.getElementById('hint');
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 3000);
    }

    // ============ 动画循环 ============
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        // 更新火焰粒子
        fireParticles.forEach(points => {
            if (!points.visible) return;
            const positions = points.geometry.attributes.position.array;
            const vels = points.userData.velocities;
            const h = points.userData.height;
            const r = points.userData.radius;

            for (let i = 0; i < vels.length; i++) {
                vels[i].life += delta * 0.5;
                if (vels[i].life > 1) {
                    vels[i].life = 0;
                    const angle = Math.random() * Math.PI * 2;
                    const rad = Math.random() * (r - 1);
                    positions[i*3] = Math.cos(angle) * rad;
                    positions[i*3+1] = h - 1;
                    positions[i*3+2] = Math.sin(angle) * rad;
                } else {
                    positions[i*3] += vels[i].x;
                    positions[i*3+1] += vels[i].y;
                    positions[i*3+2] += vels[i].z;
                }
            }
            points.geometry.attributes.position.needsUpdate = true;
        });

        // 更新烟雾
        smokeParticles.forEach(points => {
            if (!points.visible) return;
            const positions = points.geometry.attributes.position.array;
            const vels = points.userData.velocities;
            const h = points.userData.height;

            for (let i = 0; i < vels.length; i++) {
                vels[i].life += delta * 0.2;
                if (vels[i].life > 1) {
                    vels[i].life = 0;
                    const angle = Math.random() * Math.PI * 2;
                    positions[i*3] = Math.cos(angle) * 2;
                    positions[i*3+1] = h + 2;
                    positions[i*3+2] = Math.sin(angle) * 2;
                } else {
                    positions[i*3] += vels[i].x;
                    positions[i*3+1] += vels[i].y;
                    positions[i*3+2] += vels[i].z;
                }
            }
            points.geometry.attributes.position.needsUpdate = true;
        });

        // 更新泡沫
        foamParticles.forEach(points => {
            const positions = points.geometry.attributes.position.array;
            const vels = points.userData.velocities;
            for (let i = 0; i < vels.length; i++) {
                vels[i].life += delta * 0.3;
                if (vels[i].life > 1) {
                    vels[i].life = 0;
                    positions[i*3] = 3 + (Math.random() - 0.5) * 2;
                    positions[i*3+1] = 16;
                    positions[i*3+2] = 3 + (Math.random() - 0.5) * 2;
                } else {
                    positions[i*3] += vels[i].x;
                    positions[i*3+1] += vels[i].y;
                    positions[i*3+2] += vels[i].z;
                }
            }
            points.geometry.attributes.position.needsUpdate = true;
        });

        // 更新冷却水
        waterParticles.forEach(points => {
            const positions = points.geometry.attributes.position.array;
            const vels = points.userData.velocities;
            const cx = points.userData.cx;
            const h = points.userData.height;
            const r = points.userData.radius;
            for (let i = 0; i < vels.length; i++) {
                vels[i].life += delta * 0.4;
                if (vels[i].life > 1) {
                    vels[i].life = 0;
                    const angle = Math.random() * Math.PI * 2;
                    positions[i*3] = cx + Math.cos(angle) * (r + 0.5);
                    positions[i*3+1] = h + 1;
                    positions[i*3+2] = Math.sin(angle) * (r + 0.5);
                } else {
                    positions[i*3] += vels[i].x;
                    positions[i*3+1] += vels[i].y;
                    positions[i*3+2] += vels[i].z;
                }
            }
            points.geometry.attributes.position.needsUpdate = true;
        });

        // 消防车警灯闪烁
        if (fireTruck && fireTruck.visible) {
            const lightBar = fireTruck.children[fireTruck.children.length - 1];
            if (lightBar) {
                lightBar.material.color.setHex(
                    Math.sin(Date.now() * 0.01) > 0 ? 0xFF0000 : 0x0000FF
                );
            }
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // ============ 响应式 ============
    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ============ 启动 ============
    init();
    </script>
</body>
</html>
